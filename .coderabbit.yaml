language: "en-US"

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!static/component-library.html"  # canonical source file — large, mostly generated demo markup
    - "!package-lock.json"
    - "!build/**"
    - "!node_modules/**"

chat:
  auto_reply: true
