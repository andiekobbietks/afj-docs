name: Update README screenshots

on:
  push:
    branches: [main]
    paths:
      - 'static/component-library.html'
      - 'static/icon-library.html'
      - 'static/ui-mockups.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture sliced screenshots
        run: |
          rm -rf static/screenshots
          mkdir -p static/screenshots
          node - <<'EOF'
          const { chromium } = require('playwright');
          const path = require('path');
          const fs = require('fs');

          // Long, scrollable reference docs get sliced into numbered parts
          // (each collapsible on its own in the README) instead of one
          // enormous full-page image. Short pages stay as a single shot.
          const targets = [
            { file: 'component-library.html', slug: 'component-library', width: 1280, sliceHeight: 1400 },
            { file: 'ui-mockups.html', slug: 'ui-mockups', width: 1280, sliceHeight: 1400 },
            { file: 'icon-library.html', slug: 'icon-library', width: 1280, sliceHeight: 0 },
          ];

          (async () => {
            const browser = await chromium.launch();
            const manifest = {};

            for (const t of targets) {
              const page = await browser.newPage({ viewport: { width: t.width, height: 900 } });
              const filePath = 'file://' + path.resolve('static', t.file);
              await page.goto(filePath, { waitUntil: 'networkidle' });
              await page.waitForTimeout(800);

              if (t.sliceHeight === 0) {
                await page.screenshot({ path: `static/screenshots/${t.slug}.png`, fullPage: true });
                manifest[t.slug] = 1;
              } else {
                const fullHeight = await page.evaluate(() => document.body.scrollHeight);
                const parts = Math.max(1, Math.ceil(fullHeight / t.sliceHeight));
                for (let i = 0; i < parts; i++) {
                  const clipHeight = Math.min(t.sliceHeight, fullHeight - i * t.sliceHeight);
                  await page.screenshot({
                    path: `static/screenshots/${t.slug}-${i + 1}.png`,
                    clip: { x: 0, y: i * t.sliceHeight, width: t.width, height: clipHeight },
                  });
                }
                manifest[t.slug] = parts;
              }
              await page.close();
            }
            await browser.close();
            fs.writeFileSync('static/screenshots/manifest.json', JSON.stringify(manifest, null, 2));
          })();
          EOF

      - name: Commit screenshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/screenshots
          git diff --cached --quiet && echo "No screenshot changes" || git commit -m "Auto-update README screenshots [skip ci]"
          git push
