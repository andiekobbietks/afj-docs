name: Update README screenshots

on:
  push:
    branches: [main]
    paths:
      - 'static/component-library.html'
      - 'static/icon-library.html'
      - 'static/ui-mockups.html'
      - 'scripts/screenshot.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture sliced screenshots
        run: |
          rm -rf static/screenshots
          mkdir -p static/screenshots
          node scripts/screenshot.js > /tmp/screenshot-log.txt 2>&1
          echo "SCRIPT_EXIT=$?" >> /tmp/screenshot-log.txt
          cat /tmp/screenshot-log.txt
        continue-on-error: true

      - name: Save debug log regardless of outcome
        if: always()
        run: |
          mkdir -p static/screenshots
          cp /tmp/screenshot-log.txt static/screenshots/_debug-log.txt || echo "no log file produced" > static/screenshots/_debug-log.txt

      - name: Commit screenshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/screenshots
          git diff --cached --quiet && echo "No screenshot changes" || git commit -m "Auto-update README screenshots [skip ci]"
          git push
